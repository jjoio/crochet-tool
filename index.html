<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>织毛线</title>
  <style>
    :root {
      --bg: #fff5fb;
      --bg2: #fdf0ff;
      --text: #3c2b44;
      --muted: #7a6a84;
      --pink: #ff73b6;
      --blue: #98d6ff;
      --danger: #ff6f8e;
      --shadow: 0 10px 24px rgba(245, 83, 159, 0.14);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overscroll-behavior: none;
      background-color: var(--bg);
      background:
        radial-gradient(120vw 60vh at 15% -5%, #ffd8ea 0, transparent 55%),
        radial-gradient(120vw 70vh at 100% 0%, #e7dcff 0, transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      overflow-x: hidden;
      touch-action: manipulation;
      padding: 0;
    }

    .phone {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      min-height: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: calc(10px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
    }

    @media (min-width: 760px) {
      body { display: grid; place-items: center; }
      .phone {
        width: 420px;
        min-height: min(860px, calc(100dvh - 20px));
        height: min(860px, calc(100dvh - 20px));
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 26px 45px rgba(80, 40, 100, 0.18);
      }
    }

    .view { display: none; }
    .view.active {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
    }

    #listView,
    #patternView,
    #rowView {
      padding-left: 12px;
      padding-right: 12px;
      overflow: hidden;
    }

    #patternView {
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none;
    }

    #patternView::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .top,
    .content-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 44px;
      margin-bottom: 10px;
      padding: 4px 2px;
    }

    .title {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.5px;
      height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffd7ea, #e9e0ff);
      box-shadow: var(--shadow);
      border: 0;
      color: var(--text);
      display: inline-flex;
      align-items: center;
    }

    .project-title {
      text-align: center;
      font-weight: 1000;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0.3px;
      margin: -12px 0 10px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }

    .project-title-name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), #b085ff);
      box-shadow: var(--shadow);
      padding: 10px 12px;
    }

    .btn.secondary {
      color: #7a2f66;
      background: #fff;
      border: 1px solid #ffd2e9;
      box-shadow: 0 8px 18px rgba(131, 98, 152, 0.12);
    }

    .btn.danger { background: linear-gradient(135deg, var(--danger), #ff8dad); }
    .btn.small {
      font-size: 13px;
      height: 36px;
      padding: 0 10px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active { transform: translateY(1px); }

    .list,
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .list::-webkit-scrollbar,
    .history-list::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .swipe-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      flex: 0 0 auto;
    }

    .swipe-actions {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px;
      background: linear-gradient(135deg, rgba(255, 114, 182, 0.16), rgba(177, 138, 255, 0.18));
    }

    .swipe-front {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(122, 90, 139, 0.11);
      padding: 12px;
      transform: translateX(0);
      transition: transform .18s ease;
      touch-action: pan-y;
    }

    .swipe-wrap.open .swipe-front { transform: translateX(-144px); }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: linear-gradient(135deg, #ffe2ef, #e8e0ff);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .icon img,
    .icon-picker-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta { flex: 1 1 auto; min-width: 0; }

    .name {
      font-size: 16px;
      font-weight: 900;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .card-time {
      flex: 0 0 auto;
      font-size: 12px;
      color: #b7acbe;
      white-space: nowrap;
      align-self: center;
    }

    .row { margin-top: 5px; font-size: 13px; color: var(--muted); }

    .panel {
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(122, 90, 139, 0.12);
      padding: 14px;
    }

    .pattern-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 4px;
    }

    .label,
    .history-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      color: #4f2852;
      margin-bottom: 8px;
    }

    .label small { color: var(--muted); font-size: 12px; font-weight: 700; }

    textarea {
      width: 100%;
      min-height: 110px;
      border-radius: 14px;
      border: 1px solid #e7d6ff;
      background: #fff;
      padding: 11px;
      font-size: 14px;
      resize: none;
      outline: none;
    }

    #patternText {
      overflow: hidden;
    }

    @media (max-width: 760px) {
      /* iOS 上输入框小于 16px 容易触发页面缩放与跳动 */
      #patternText {
        font-size: 16px;
      }
    }

    textarea:focus,
    .dialog-input:focus {
      border-color: #ff8fc8;
      box-shadow: 0 0 0 4px rgba(255, 143, 200, 0.14);
    }

    .pattern-images {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .pattern-image {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: #f9f5ff;
      cursor: zoom-in;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .pattern-image img {
      width: 100%;
      max-height: min(54dvh, 360px);
      object-fit: contain;
      display: block;
      background: rgba(255, 255, 255, 0.5);
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
    }

    .counter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .step {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      border: 0;
      color: #fff;
      font-size: 30px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--pink), #ad90ff);
      box-shadow: var(--shadow);
    }

    .step.minus { background: linear-gradient(135deg, var(--blue), #a18dff); }

    .num {
      flex: 1;
      text-align: center;
      font-size: 46px;
      font-weight: 900;
      color: #2c1935;
    }

    .h-item {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      background: linear-gradient(135deg, rgba(255, 118, 186, 0.1), rgba(176, 136, 255, 0.1));
      padding: 9px 10px;
    }

    .h-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .h-row { font-weight: 900; font-size: 14px; }
    .h-time { font-size: 11px; color: #b7acbe; white-space: nowrap; }
    .h-note { font-size: 13px; color: #43364b; white-space: pre-wrap; word-break: break-word; }
    .empty { color: var(--muted); font-size: 13px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(14px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 120;
      background: rgba(55, 30, 70, 0.9);
      color: #fff;
      border-radius: 12px;
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }

    .toast.show { opacity: 1; }

    .dialog-mask {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(27, 16, 35, 0.34);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .dialog-mask.show { display: flex; }

    .dialog {
      width: min(420px, 100%);
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 16px 36px rgba(58, 34, 73, 0.25);
      padding: 14px;
    }

    .dialog-title {
      font-size: 16px;
      font-weight: 900;
      color: #4f2852;
      margin-bottom: 10px;
      line-height: 1.35;
      word-break: break-word;
    }

    .dialog-input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #e7d6ff;
      background: #fff;
      padding: 10px 11px;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .backup-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 4px;
    }

    .import-mode-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .backup-dialog {
      border-radius: 22px;
      background:
        radial-gradient(120% 80% at 0% 0%, rgba(255, 211, 233, 0.5), transparent 56%),
        radial-gradient(120% 80% at 100% 0%, rgba(230, 218, 255, 0.5), transparent 56%),
        #fff;
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 18px 36px rgba(84, 48, 108, 0.23);
      padding: 16px 16px 24px;
    }

    .backup-subtitle {
      margin: -2px 0 12px;
      color: #8f7d99;
      font-size: 13px;
      line-height: 1.35;
    }

    .backup-action {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 14px;
      border: 1px solid #f0e4f8;
      padding: 11px 12px;
      font-weight: 900;
      font-size: 16px;
      color: #6f2b61;
      background: linear-gradient(135deg, rgba(255, 238, 246, 0.9), rgba(244, 237, 255, 0.92));
      box-shadow: 0 8px 16px rgba(124, 89, 153, 0.12);
    }

    .backup-action span {
      font-size: 18px;
      line-height: 1;
      color: #9f7db8;
      flex: 0 0 auto;
      order: -1;
    }

    .backup-action.danger {
      color: #8d2d49;
      background: linear-gradient(135deg, rgba(255, 233, 239, 0.95), rgba(255, 245, 248, 0.95));
      border-color: #ffd9e4;
    }

    .icon-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .icon-picker-preview {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-size: 28px;
      background: linear-gradient(135deg, #ffe2ef, #e8e0ff);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .icon-picker-preview.empty {
      color: #cfbfd9;
      font-size: 30px;
      font-weight: 700;
    }

    .create-name-input {
      flex: 1 1 auto;
      margin-bottom: 0;
    }

    .photo-viewer {
      position: relative;
      width: min(92vw, 520px);
      max-height: 82dvh;
      border-radius: 16px;
      padding: 10px;
      background: #fff;
    }

    .photo-viewer img {
      width: 100%;
      max-height: calc(82dvh - 54px);
      object-fit: contain;
      display: block;
      border-radius: 12px;
      background: #f7f2ff;
    }
  </style>
</head>
<body>
  <main class="phone">
    <section class="view active" id="listView">
      <div class="top">
        <button class="title" id="titleBtn">🧶 织毛线</button>
        <button class="btn small" id="newProjectBtn">+ 新建作品</button>
      </div>
      <div class="list" id="projectList"></div>
    </section>

    <section class="view" id="patternView">
      <div class="content-actions">
        <button class="btn secondary small" id="patternBackBtn">返回</button>
        <button class="btn small" id="startRowBtn">行数记录</button>
      </div>
      <div class="project-title" id="patternTitle"></div>

      <div class="pattern-body">
        <div class="panel">
          <div class="label">
            <span>图解内容</span>
            <button class="btn secondary small" id="patternUploadBtn">上传图片</button>
          </div>
          <textarea id="patternText" placeholder="输入图解文字内容..."></textarea>
          <input id="patternImageInput" type="file" accept="image/*" multiple hidden>
          <div class="pattern-images" id="patternImages"></div>
        </div>
      </div>
    </section>

    <section class="view" id="rowView">
      <div class="content-actions">
        <button class="btn secondary small" id="rowBackBtn">返回</button>
      </div>
      <div class="project-title" id="rowTitle"></div>

      <div class="panel">
        <div class="counter">
          <button class="step minus" id="minusBtn">-</button>
          <div class="num" id="rowNum">1</div>
          <button class="step" id="plusBtn">+</button>
        </div>
      </div>

      <div class="panel" style="margin-top:10px;">
        <div class="label">备注</div>
        <textarea id="noteInput" placeholder="例如：第18行换色；第22行加针" style="min-height:62px;height:62px;"></textarea>
      </div>

      <div class="panel" style="margin-top:10px;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;">
        <div class="history-title">
          <span>记录</span>
          <button class="btn secondary small" id="clearHistoryBtn">清空</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="empty" id="historyEmpty" style="display:none;">暂无历史记录</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <div class="dialog-mask" id="dialogMask" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="dialog-title" id="dialogTitle"></div>
      <div class="dialog-actions">
        <button class="btn secondary small" id="dialogCancelBtn">取消</button>
        <button class="btn small" id="dialogConfirmBtn">确定</button>
      </div>
    </div>
  </div>

  <div class="dialog-mask" id="createMask" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="createTitle">
      <div class="dialog-title" id="createTitle">新建作品</div>
      <div class="icon-picker">
        <div class="icon-picker-preview empty" id="createIconPreview" role="button" tabindex="0" aria-label="上传图标">+</div>
        <input class="dialog-input create-name-input" id="createNameInput" type="text" placeholder="请输入作品名称" />
      </div>
      <input id="createIconInput" type="file" accept="image/*" hidden>
      <div class="dialog-actions">
        <button class="btn secondary small" id="createCancelBtn">取消</button>
        <button class="btn small" id="createConfirmBtn">创建</button>
      </div>
    </div>
  </div>

  <div class="dialog-mask" id="photoViewerMask" aria-hidden="true">
    <div class="photo-viewer">
      <img id="photoViewerImage" alt="图解大图">
    </div>
  </div>

  <div class="dialog-mask" id="backupMask" aria-hidden="true">
    <div class="dialog backup-dialog" role="dialog" aria-modal="true" aria-labelledby="backupTitle">
      <div class="dialog-title" id="backupTitle" style="font-size:18px;">数据备份</div>
      <div class="backup-subtitle">建议定期导出，换手机或清缓存前先备份。</div>
      <div class="backup-actions">
        <button class="backup-action" id="backupExportBtn">导出备份</button>
        <button class="backup-action" id="backupImportBtn">导入备份</button>
      </div>
    </div>
  </div>
  <div class="dialog-mask" id="importModeMask" aria-hidden="true">
    <div class="dialog backup-dialog" role="dialog" aria-modal="true" aria-labelledby="importModeTitle">
      <div class="dialog-title" id="importModeTitle" style="font-size:18px;">请选择导入方式</div>
      <div class="backup-subtitle">合并会保留当前数据；覆盖会替换当前数据。</div>
      <div class="import-mode-actions">
        <button class="backup-action" id="importMergeBtn"><span>⇄</span>合并数据</button>
        <button class="backup-action danger" id="importOverwriteBtn"><span>⚠︎</span>覆盖数据</button>
      </div>
    </div>
  </div>
  <input id="importInput" type="file" accept="application/json,.json" hidden>

  <script>
    const STORAGE_KEY = "crochet_projects_v3";
    const DEFAULT_PATTERN_TEXT = "🪡 针号：\n🧶 线材：";
    const LEGACY_DEFAULT_PATTERN_TEXT = "🪡针号：\n🧶线材：";
    const IMAGE_DB_NAME = "crochet_media_v1";
    const IMAGE_DB_VERSION = 1;
    const IMAGE_STORE = "pattern_images";

    const listView = document.getElementById("listView");
    const patternView = document.getElementById("patternView");
    const rowView = document.getElementById("rowView");

    const projectList = document.getElementById("projectList");
    const titleBtn = document.getElementById("titleBtn");
    const newProjectBtn = document.getElementById("newProjectBtn");
    const backupMask = document.getElementById("backupMask");
    const backupExportBtn = document.getElementById("backupExportBtn");
    const backupImportBtn = document.getElementById("backupImportBtn");
    const importModeMask = document.getElementById("importModeMask");
    const importMergeBtn = document.getElementById("importMergeBtn");
    const importOverwriteBtn = document.getElementById("importOverwriteBtn");
    const importInput = document.getElementById("importInput");

    const patternBackBtn = document.getElementById("patternBackBtn");
    const patternTitle = document.getElementById("patternTitle");
    const patternText = document.getElementById("patternText");
    const patternUploadBtn = document.getElementById("patternUploadBtn");
    const patternImageInput = document.getElementById("patternImageInput");
    const patternImages = document.getElementById("patternImages");
    const startRowBtn = document.getElementById("startRowBtn");

    const rowBackBtn = document.getElementById("rowBackBtn");
    const rowTitle = document.getElementById("rowTitle");
    const rowNum = document.getElementById("rowNum");
    const plusBtn = document.getElementById("plusBtn");
    const minusBtn = document.getElementById("minusBtn");
    const noteInput = document.getElementById("noteInput");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const historyList = document.getElementById("historyList");
    const historyEmpty = document.getElementById("historyEmpty");

    const toastEl = document.getElementById("toast");

    const dialogMask = document.getElementById("dialogMask");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogCancelBtn = document.getElementById("dialogCancelBtn");
    const dialogConfirmBtn = document.getElementById("dialogConfirmBtn");

    const createMask = document.getElementById("createMask");
    const createTitle = document.getElementById("createTitle");
    const createIconPreview = document.getElementById("createIconPreview");
    const createNameInput = document.getElementById("createNameInput");
    const createIconInput = document.getElementById("createIconInput");
    const createCancelBtn = document.getElementById("createCancelBtn");
    const createConfirmBtn = document.getElementById("createConfirmBtn");
    const photoViewerMask = document.getElementById("photoViewerMask");
    const photoViewerImage = document.getElementById("photoViewerImage");

    const icons = ["🧶", "🧵", "🎀", "🌸", "🍓", "🐰", "✨", "🩷", "🪡"];

    let projects = loadProjects();
    if (normalizeProjects(projects)) persist();

    let currentId = null;
    let openedSwipeId = null;
    let globalPointerBound = false;
    let storageErrorNotified = false;
    let activeDialogResolver = null;
    let pendingCreateIconFile = null;
    let pendingCreateIconPreviewUrl = "";
    let createDialogMode = "create";
    let createDialogEditingId = null;
    let longPressTimer = null;
    let longPressTarget = null;
    let suppressImageClickUntil = 0;
    let imageDbPromise = null;
    let patternRenderToken = 0;
    let listIconHydrateToken = 0;
    let patternObjectUrls = [];
    let listIconObjectUrls = [];
    let viewerObjectUrl = "";
    let importModeResolver = null;

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function nowText() {
      const d = new Date();
      const p = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function nowMinuteText() {
      const d = new Date();
      const p = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())}`;
    }

    function formatCreatedAtText(v) {
      return String(v || "").replaceAll("-", "/").split(" ")[0];
    }

    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 900);
    }

    function escapeHtml(v) {
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function findClosest(target, selector) {
      if (target instanceof Element) return target.closest(selector);
      if (target && target.parentElement) return target.parentElement.closest(selector);
      return null;
    }

    function idbRequest(req) {
      return new Promise((resolve, reject) => {
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("IndexedDB 请求失败"));
      });
    }

    function getImageDb() {
      if (imageDbPromise) return imageDbPromise;
      imageDbPromise = new Promise((resolve, reject) => {
        if (!("indexedDB" in window)) {
          reject(new Error("当前浏览器不支持 IndexedDB"));
          return;
        }
        const req = indexedDB.open(IMAGE_DB_NAME, IMAGE_DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(IMAGE_STORE)) {
            db.createObjectStore(IMAGE_STORE, { keyPath: "id" });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("打开 IndexedDB 失败"));
      });
      return imageDbPromise;
    }

    function isImageDbRef(v) {
      return typeof v === "string" && v.startsWith("imgdb:");
    }

    function isLegacyDataUrl(v) {
      return typeof v === "string" && v.startsWith("data:image");
    }

    async function saveImageBlobToDb(blob) {
      const db = await getImageDb();
      const id = `imgdb:${uid()}`;
      const tx = db.transaction(IMAGE_STORE, "readwrite");
      await idbRequest(tx.objectStore(IMAGE_STORE).put({ id, blob }));
      return id;
    }

    async function getImageBlobFromDb(id) {
      const db = await getImageDb();
      const tx = db.transaction(IMAGE_STORE, "readonly");
      const row = await idbRequest(tx.objectStore(IMAGE_STORE).get(id));
      return row && row.blob ? row.blob : null;
    }

    async function deleteImageFromDb(id) {
      const db = await getImageDb();
      const tx = db.transaction(IMAGE_STORE, "readwrite");
      await idbRequest(tx.objectStore(IMAGE_STORE).delete(id));
    }

    async function putImageBlobToDb(id, blob) {
      const db = await getImageDb();
      const tx = db.transaction(IMAGE_STORE, "readwrite");
      await idbRequest(tx.objectStore(IMAGE_STORE).put({ id, blob }));
    }

    async function getAllImageIdsFromDb() {
      const db = await getImageDb();
      const tx = db.transaction(IMAGE_STORE, "readonly");
      const keys = await idbRequest(tx.objectStore(IMAGE_STORE).getAllKeys());
      return Array.isArray(keys) ? keys.map(v => String(v)) : [];
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("图片编码失败"));
        reader.readAsDataURL(blob);
      });
    }

    async function dataUrlToBlob(dataUrl) {
      const res = await fetch(dataUrl);
      return res.blob();
    }

    async function migrateLegacyPatternImages() {
      let migrated = 0;
      let failed = 0;

      for (const p of projects) {
        const images = Array.isArray(p.patternImages) ? p.patternImages : [];
        for (let i = 0; i < images.length; i += 1) {
          const legacyRef = images[i];
          if (!isLegacyDataUrl(legacyRef)) continue;
          try {
            const res = await fetch(legacyRef);
            const blob = await res.blob();
            const newRef = await saveImageBlobToDb(blob);
            images[i] = newRef;
            if (!persist()) {
              images[i] = legacyRef;
              try { await deleteImageFromDb(newRef); } catch {}
              failed += 1;
              continue;
            }
            migrated += 1;
          } catch {
            failed += 1;
          }
        }
      }

      if (migrated > 0) {
        showToast(`已优化 ${migrated} 张历史图片`);
        const p = currentProject();
        if (p && patternView.classList.contains("active")) renderPatternImages(p);
      } else if (failed > 0) {
        showToast("历史图片迁移失败，请清理浏览器站点数据后重试");
      }
    }

    async function migrateLegacyProjectIcons() {
      let migrated = 0;
      for (const p of projects) {
        if (p.iconType !== "image" || !isLegacyDataUrl(p.iconValue)) continue;
        try {
          const res = await fetch(p.iconValue);
          const blob = await res.blob();
          const newRef = await saveImageBlobToDb(blob);
          const oldRef = p.iconValue;
          p.iconValue = newRef;
          if (!persist()) {
            p.iconValue = oldRef;
            try { await deleteImageFromDb(newRef); } catch {}
            continue;
          }
          migrated += 1;
        } catch {}
      }
      if (migrated > 0) {
        renderList();
        showToast(`已优化 ${migrated} 个历史图标`);
      }
    }

    function releaseListIconObjectUrls() {
      for (const url of listIconObjectUrls) URL.revokeObjectURL(url);
      listIconObjectUrls = [];
    }

    async function hydrateListIconRefs(token) {
      const iconImgs = projectList.querySelectorAll("img[data-icon-ref]");
      for (const img of iconImgs) {
        if (token !== listIconHydrateToken) return;
        const ref = img.getAttribute("data-icon-ref");
        if (!ref || !isImageDbRef(ref)) continue;
        try {
          const blob = await getImageBlobFromDb(ref);
          if (!blob) continue;
          const url = URL.createObjectURL(blob);
          if (token !== listIconHydrateToken || !img.isConnected) {
            URL.revokeObjectURL(url);
            continue;
          }
          listIconObjectUrls.push(url);
          img.src = url;
        } catch {}
      }
    }

    function clampRow(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return 1;
      return Math.max(1, Math.floor(n));
    }

    function iconByName(name) {
      let sum = 0;
      for (const ch of name) sum += ch.charCodeAt(0);
      return icons[sum % icons.length];
    }

    function projectIconHtml(project) {
      if (project.iconType === "image" && project.iconValue) {
        if (isLegacyDataUrl(project.iconValue)) {
          return `<img src="${escapeHtml(project.iconValue)}" alt="图标">`;
        }
        if (isImageDbRef(project.iconValue)) {
          return `<img data-icon-ref="${escapeHtml(project.iconValue)}" alt="图标">`;
        }
      }
      return escapeHtml(project.iconValue || "🧶");
    }

    function projectTitleHtml(project) {
      const name = escapeHtml(project.name || "未命名项目");
      return `<span class="project-title-name">${name}</span>`;
    }

    function loadProjects() {
      try {
        const latest = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(latest) ? latest : [];
      } catch {
        return [];
      }
    }

    function normalizeProjects(list) {
      if (!Array.isArray(list)) return false;
      let changed = false;
      for (const p of list) {
        if (!p || typeof p !== "object") continue;

        if (!p.iconType) {
          p.iconType = (typeof p.icon === "string" && p.icon.startsWith("data:image")) ? "image" : "emoji";
          p.iconValue = p.icon || iconByName(String(p.name || ""));
          changed = true;
        }

        if (typeof p.iconValue !== "string" || !p.iconValue) {
          p.iconType = "emoji";
          p.iconValue = iconByName(String(p.name || ""));
          changed = true;
        }

        if (!Array.isArray(p.patternImages)) {
          p.patternImages = [];
          changed = true;
        }

        if (typeof p.patternText !== "string") {
          p.patternText = DEFAULT_PATTERN_TEXT;
          changed = true;
        }
        if (p.patternText === LEGACY_DEFAULT_PATTERN_TEXT) {
          p.patternText = DEFAULT_PATTERN_TEXT;
          changed = true;
        }

        if (!Array.isArray(p.history)) {
          p.history = [];
          changed = true;
        }

        p.currentRow = clampRow(p.currentRow);
        p.note = String(p.note || "");
        p.name = String(p.name || "未命名项目");
        if (typeof p.createdAt !== "string" || !p.createdAt.trim()) {
          p.createdAt = nowMinuteText();
          changed = true;
        }
      }
      return changed;
    }

    function persist() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        storageErrorNotified = false;
        return true;
      } catch {
        if (!storageErrorNotified) {
          showToast("保存失败：本地存储空间不足");
          storageErrorNotified = true;
        }
        return false;
      }
    }

    function currentProject() {
      return projects.find(p => p.id === currentId) || null;
    }

    function switchView(view) {
      [listView, patternView, rowView].forEach(v => v.classList.remove("active"));
      view.classList.add("active");
    }

    function toListView() {
      switchView(listView);
      currentId = null;
      patternRenderToken += 1;
      releasePatternObjectUrls(true);
      closePhotoViewer();
      closeOpenedSwipe();
    }

    function toPatternView(id) {
      const p = projects.find(i => i.id === id);
      if (!p) return;
      currentId = id;
      switchView(patternView);
      patternTitle.innerHTML = projectTitleHtml(p);
      patternText.value = p.patternText || DEFAULT_PATTERN_TEXT;
      autoResizePatternText();
      renderPatternImages(p);
    }

    function toRowView() {
      const p = currentProject();
      if (!p) return;
      closePhotoViewer();
      switchView(rowView);
      rowTitle.innerHTML = projectTitleHtml(p);
      rowNum.textContent = String(clampRow(p.currentRow));
      noteInput.value = p.note || "";
      renderHistory(p);
    }

    function releaseObjectUrlsInBatches(urls) {
      if (!urls.length) return;
      let cursor = 0;
      const batchSize = 24;
      const releaseStep = deadline => {
        const hasDeadline = deadline && typeof deadline.timeRemaining === "function";
        const maxByTime = hasDeadline ? Math.max(1, Math.floor(deadline.timeRemaining() / 2)) : batchSize;
        const end = Math.min(cursor + Math.min(batchSize, maxByTime), urls.length);
        for (; cursor < end; cursor += 1) URL.revokeObjectURL(urls[cursor]);
        if (cursor < urls.length) scheduleNextRelease();
      };

      const scheduleNextRelease = () => {
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(releaseStep, { timeout: 180 });
        } else {
          setTimeout(() => releaseStep(), 16);
        }
      };

      // 先让返回视图完成绘制，再在空闲时分批释放，减少“点击返回后的瞬时卡顿”。
      setTimeout(scheduleNextRelease, 120);
    }

    function releasePatternObjectUrls(defer = false) {
      if (!patternObjectUrls.length) return;
      const urls = patternObjectUrls;
      patternObjectUrls = [];
      if (defer) {
        releaseObjectUrlsInBatches(urls);
        return;
      }
      for (const url of urls) URL.revokeObjectURL(url);
    }

    async function resolveImageSrc(ref) {
      if (isLegacyDataUrl(ref)) return ref;
      if (!isImageDbRef(ref)) return "";
      const blob = await getImageBlobFromDb(ref);
      if (!blob) return "";
      const url = URL.createObjectURL(blob);
      patternObjectUrls.push(url);
      return url;
    }

    async function renderPatternImages(project) {
      const images = Array.isArray(project.patternImages) ? project.patternImages : [];
      const token = ++patternRenderToken;
      releasePatternObjectUrls();
      patternImages.innerHTML = "";

      for (let index = 0; index < images.length; index += 1) {
        const ref = images[index];
        const div = document.createElement("div");
        div.className = "pattern-image";
        div.dataset.ref = String(ref || "");
        div.dataset.index = String(index);
        patternImages.appendChild(div);

        try {
          const src = await resolveImageSrc(ref);
          if (token !== patternRenderToken) return;
          if (!src) {
            div.remove();
            continue;
          }
          div.innerHTML = `<img src="${escapeHtml(src)}" alt="图解图片">`;
        } catch {
          div.remove();
        }
      }
    }

    async function openPhotoViewer(ref) {
      if (viewerObjectUrl) {
        URL.revokeObjectURL(viewerObjectUrl);
        viewerObjectUrl = "";
      }

      if (isLegacyDataUrl(ref)) {
        photoViewerImage.src = ref;
      } else if (isImageDbRef(ref)) {
        let blob = null;
        try {
          blob = await getImageBlobFromDb(ref);
        } catch {
          showToast("图片读取失败");
          return;
        }
        if (!blob) {
          showToast("图片读取失败");
          return;
        }
        viewerObjectUrl = URL.createObjectURL(blob);
        photoViewerImage.src = viewerObjectUrl;
      } else {
        showToast("图片读取失败");
        return;
      }

      photoViewerMask.classList.add("show");
      photoViewerMask.setAttribute("aria-hidden", "false");
    }

    function closePhotoViewer() {
      photoViewerMask.classList.remove("show");
      photoViewerMask.setAttribute("aria-hidden", "true");
      photoViewerImage.src = "";
      if (viewerObjectUrl) {
        URL.revokeObjectURL(viewerObjectUrl);
        viewerObjectUrl = "";
      }
    }

    function cancelLongPressDelete() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      longPressTarget = null;
    }

    async function requestDeletePatternImage(index) {
      const p = currentProject();
      if (!p) return;
      if (!Number.isInteger(index) || index < 0 || index >= p.patternImages.length) return;
      const ok = await openConfirmDialog("确定删除这张图片吗？", "删除");
      if (!ok) return;
      const removed = p.patternImages[index];
      p.patternImages.splice(index, 1);
      if (!persist()) {
        p.patternImages.splice(index, 0, removed);
        showToast("删除失败：保存未成功");
        return;
      }
      if (isImageDbRef(removed)) {
        try {
          await deleteImageFromDb(removed);
        } catch {}
      }
      renderPatternImages(p);
      showToast("已删除图片");
    }

    function autoResizePatternText() {
      const prevTop = patternText.getBoundingClientRect().top;
      patternText.style.height = "auto";
      const nextHeight = Math.max(patternText.scrollHeight, 110);
      patternText.style.height = `${nextHeight}px`;

      // 让输入框顶部尽量固定在同一视觉位置，减少输入/删除时页面跳动。
      if (patternView.classList.contains("active")) {
        const newTop = patternText.getBoundingClientRect().top;
        const shift = newTop - prevTop;
        if (shift !== 0) patternView.scrollTop += shift;
      }
    }

    function collectProjectImageRefs(project) {
      const refs = [];
      if (project && project.iconType === "image" && isImageDbRef(project.iconValue)) {
        refs.push(project.iconValue);
      }
      const images = project && Array.isArray(project.patternImages) ? project.patternImages : [];
      for (const ref of images) {
        if (isImageDbRef(ref)) refs.push(ref);
      }
      return refs;
    }

    function collectAllImageRefs(projectListData) {
      const refs = new Set();
      const list = Array.isArray(projectListData) ? projectListData : [];
      for (const p of list) {
        for (const ref of collectProjectImageRefs(p)) refs.add(ref);
      }
      return Array.from(refs);
    }

    function backupFileName() {
      const d = new Date();
      const p = n => String(n).padStart(2, "0");
      return `crochet-backup-${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.json`;
    }

    function closeImportModeDialog(mode = null) {
      if (!importModeResolver) return;
      const resolver = importModeResolver;
      importModeResolver = null;
      importModeMask.classList.remove("show");
      importModeMask.setAttribute("aria-hidden", "true");
      resolver(mode);
    }

    function openImportModeDialog() {
      if (importModeResolver) return Promise.resolve(null);
      return new Promise(resolve => {
        importModeResolver = resolve;
        importModeMask.classList.add("show");
        importModeMask.setAttribute("aria-hidden", "false");
      });
    }

    function remapProjectImageRefs(project, refMap) {
      if (!project || typeof project !== "object") return;
      if (project.iconType === "image" && isImageDbRef(project.iconValue) && refMap.has(project.iconValue)) {
        project.iconValue = refMap.get(project.iconValue);
      }
      if (!Array.isArray(project.patternImages)) return;
      project.patternImages = project.patternImages.map(ref => {
        if (isImageDbRef(ref) && refMap.has(ref)) return refMap.get(ref);
        return ref;
      });
    }

    function ensureUniqueProjectIds(importedProjects, existingProjects) {
      const used = new Set(existingProjects.map(p => String(p.id)));
      for (const p of importedProjects) {
        if (!p || typeof p !== "object") continue;
        let id = String(p.id || "");
        if (!id || used.has(id)) {
          id = uid();
          p.id = id;
        }
        used.add(id);
      }
    }

    async function exportBackup() {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        projects,
        images: {}
      };

      const refs = collectAllImageRefs(projects);
      for (const ref of refs) {
        if (!isImageDbRef(ref)) continue;
        try {
          const blob = await getImageBlobFromDb(ref);
          if (!blob) continue;
          data.images[ref] = await blobToDataUrl(blob);
        } catch {}
      }

      const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = backupFileName();
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      const ua = navigator.userAgent || "";
      const isIOS = /iP(hone|ad|od)/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      if (isIOS) showToast("已生成备份，请确认下载");
      else showToast("备份已导出");
    }

    async function importBackupFile(file) {
      let raw = "";
      try {
        raw = await file.text();
      } catch {
        showToast("导入失败：文件读取失败");
        return;
      }

      let parsed = null;
      try {
        parsed = JSON.parse(raw);
      } catch {
        showToast("导入失败：JSON 格式错误");
        return;
      }

      if (!parsed || typeof parsed !== "object" || !Array.isArray(parsed.projects)) {
        showToast("导入失败：备份格式不正确");
        return;
      }

      const mode = await openImportModeDialog();
      if (!mode) return;

      const importedProjects = JSON.parse(JSON.stringify(parsed.projects));
      const nextImages = parsed.images && typeof parsed.images === "object" ? parsed.images : {};
      const requiredRefs = collectAllImageRefs(importedProjects).filter(isImageDbRef);
      const refMap = new Map();
      const insertedImageIds = [];

      for (const ref of requiredRefs) {
        const dataUrl = nextImages[ref];
        if (typeof dataUrl !== "string" || !dataUrl.startsWith("data:image")) {
          showToast("导入失败：备份图片不完整");
          return;
        }
      }

      try {
        for (const oldRef of requiredRefs) {
          const dataUrl = nextImages[oldRef];
          const blob = await dataUrlToBlob(dataUrl);
          const newRef = `imgdb:${uid()}`;
          await putImageBlobToDb(newRef, blob);
          refMap.set(oldRef, newRef);
          insertedImageIds.push(newRef);
        }
      } catch {
        for (const id of insertedImageIds) {
          try { await deleteImageFromDb(id); } catch {}
        }
        showToast("导入失败：图片数据写入失败");
        return;
      }

      for (const p of importedProjects) remapProjectImageRefs(p, refMap);

      const prevProjects = projects;
      let nextProjects = importedProjects;
      if (mode === "merge") {
        ensureUniqueProjectIds(importedProjects, projects);
        nextProjects = projects.concat(importedProjects);
      }

      projects = nextProjects;
      if (normalizeProjects(projects)) {
        // normalizeProjects may fix legacy data; continue to persist below
      }
      if (!persist()) {
        projects = prevProjects;
        for (const id of insertedImageIds) {
          try { await deleteImageFromDb(id); } catch {}
        }
        showToast("导入失败：本地存储空间不足");
        return;
      }

      try {
        const usedRefs = new Set(collectAllImageRefs(projects));
        const allIds = await getAllImageIdsFromDb();
        for (const id of allIds) {
          if (!usedRefs.has(id)) {
            try { await deleteImageFromDb(id); } catch {}
          }
        }
      } catch {}

      currentId = null;
      switchView(listView);
      closePhotoViewer();
      releasePatternObjectUrls();
      renderList();
      if (mode === "merge") showToast(`导入成功：已合并 ${importedProjects.length} 个作品`);
      else showToast("导入成功：已覆盖当前数据");
    }

    function closeOpenedSwipe(exceptId = null) {
      if (!openedSwipeId || openedSwipeId === exceptId) return;
      const opened = document.querySelector(`.swipe-wrap[data-id="${openedSwipeId}"]`);
      if (opened) opened.classList.remove("open");
      openedSwipeId = null;
    }

    function onGlobalPointerDown(e) {
      if (!listView.classList.contains("active")) return;
      const wrap = findClosest(e.target, ".swipe-wrap");
      if (!wrap) {
        closeOpenedSwipe();
        return;
      }
      closeOpenedSwipe(wrap.dataset.id);
    }

    function attachSwipe(front, wrap, id) {
      let sx = 0;
      let sy = 0;
      let tracking = false;
      let dragged = false;
      let wheelDx = 0;
      let wheelResetTimer = null;

      function start(ev) {
        const t = ev.touches ? ev.touches[0] : ev;
        sx = t.clientX;
        sy = t.clientY;
        tracking = true;
        dragged = false;
      }

      function move(ev) {
        if (!tracking) return;
        const t = ev.touches ? ev.touches[0] : ev;
        const dx = t.clientX - sx;
        const dy = t.clientY - sy;
        if (Math.abs(dx) <= 14 || Math.abs(dx) <= Math.abs(dy)) return;
        dragged = true;
        if (ev.cancelable) ev.preventDefault();
        if (dx < -34) {
          closeOpenedSwipe(id);
          wrap.classList.add("open");
          openedSwipeId = id;
        }
        if (dx > 30) {
          wrap.classList.remove("open");
          if (openedSwipeId === id) openedSwipeId = null;
        }
      }

      function end() {
        tracking = false;
        if (dragged) front.dataset.ignoreClickUntil = String(Date.now() + 260);
      }

      function onWheel(ev) {
        if (!listView.classList.contains("active")) return;
        if (Math.abs(ev.deltaX) < 2) return;
        if (Math.abs(ev.deltaX) <= Math.abs(ev.deltaY)) return;
        if (ev.cancelable) ev.preventDefault();

        wheelDx += ev.deltaX;
        if (wheelDx > 34) {
          closeOpenedSwipe(id);
          wrap.classList.add("open");
          openedSwipeId = id;
          wheelDx = 0;
        } else if (wheelDx < -26) {
          wrap.classList.remove("open");
          if (openedSwipeId === id) openedSwipeId = null;
          wheelDx = 0;
        }

        clearTimeout(wheelResetTimer);
        wheelResetTimer = setTimeout(() => { wheelDx = 0; }, 120);
      }

      if (window.PointerEvent) {
        front.addEventListener("pointerdown", start);
        front.addEventListener("pointermove", move);
        front.addEventListener("pointerup", end);
        front.addEventListener("pointercancel", end);
      } else {
        front.addEventListener("touchstart", start, { passive: true });
        front.addEventListener("touchmove", move, { passive: false });
        front.addEventListener("touchend", end, { passive: true });
      }
      front.addEventListener("wheel", onWheel, { passive: false });
    }

    function renderList() {
      releaseListIconObjectUrls();
      projectList.innerHTML = "";
      projects.forEach(project => {
        const wrap = document.createElement("div");
        wrap.className = "swipe-wrap";
        wrap.dataset.id = project.id;

        const actions = document.createElement("div");
        actions.className = "swipe-actions";
        actions.innerHTML = `
          <button class="btn secondary small" data-act="rename">重命名</button>
          <button class="btn danger small" data-act="delete">删除</button>
        `;

        const front = document.createElement("div");
        front.className = "swipe-front";
        front.innerHTML = `
          <div class="icon">${projectIconHtml(project)}</div>
          <div class="meta">
            <div class="name">${escapeHtml(project.name || "未命名项目")}</div>
          </div>
          <div class="card-time">${escapeHtml(formatCreatedAtText(project.createdAt))}</div>
        `;

        actions.addEventListener("click", e => {
          const btn = findClosest(e.target, "button");
          if (!btn) return;
          const act = btn.dataset.act;
          if (act === "rename") renameProject(project.id);
          if (act === "delete") deleteProject(project.id);
        });

        front.addEventListener("click", e => {
          const ignoreUntil = Number(front.dataset.ignoreClickUntil || 0);
          if (ignoreUntil > Date.now()) return;
          if (wrap.classList.contains("open")) {
            wrap.classList.remove("open");
            openedSwipeId = null;
            return;
          }
          closeOpenedSwipe();
          toPatternView(project.id);
        });

        attachSwipe(front, wrap, project.id);
        wrap.appendChild(actions);
        wrap.appendChild(front);
        projectList.appendChild(wrap);
      });
      const token = ++listIconHydrateToken;
      requestAnimationFrame(() => hydrateListIconRefs(token));

      if (!globalPointerBound) {
        document.addEventListener("pointerdown", onGlobalPointerDown, { capture: true });
        globalPointerBound = true;
      }
    }

    function setCreateIconPreviewEmpty() {
      if (pendingCreateIconPreviewUrl) {
        URL.revokeObjectURL(pendingCreateIconPreviewUrl);
        pendingCreateIconPreviewUrl = "";
      }
      createIconPreview.textContent = "+";
      createIconPreview.classList.add("empty");
    }

    async function setCreateIconPreviewByProject(project) {
      if (!project || project.iconType !== "image" || !project.iconValue) {
        setCreateIconPreviewEmpty();
        return;
      }
      if (isLegacyDataUrl(project.iconValue)) {
        if (pendingCreateIconPreviewUrl) {
          URL.revokeObjectURL(pendingCreateIconPreviewUrl);
          pendingCreateIconPreviewUrl = "";
        }
        createIconPreview.innerHTML = `<img src="${escapeHtml(project.iconValue)}" alt="图标预览">`;
        createIconPreview.classList.remove("empty");
        return;
      }
      if (!isImageDbRef(project.iconValue)) {
        setCreateIconPreviewEmpty();
        return;
      }
      try {
        const blob = await getImageBlobFromDb(project.iconValue);
        if (!blob) {
          setCreateIconPreviewEmpty();
          return;
        }
        if (pendingCreateIconPreviewUrl) URL.revokeObjectURL(pendingCreateIconPreviewUrl);
        pendingCreateIconPreviewUrl = URL.createObjectURL(blob);
        createIconPreview.innerHTML = `<img src="${escapeHtml(pendingCreateIconPreviewUrl)}" alt="图标预览">`;
        createIconPreview.classList.remove("empty");
      } catch {
        setCreateIconPreviewEmpty();
      }
    }

    function resetCreateDialogState() {
      pendingCreateIconFile = null;
      createDialogMode = "create";
      createDialogEditingId = null;
      createNameInput.value = "";
      createIconInput.value = "";
      setCreateIconPreviewEmpty();
    }

    function closeCreateDialog() {
      createMask.classList.remove("show");
      createMask.setAttribute("aria-hidden", "true");
      resetCreateDialogState();
    }

    function openBackupDialog() {
      backupMask.classList.add("show");
      backupMask.setAttribute("aria-hidden", "false");
    }

    function closeBackupDialog() {
      backupMask.classList.remove("show");
      backupMask.setAttribute("aria-hidden", "true");
    }

    function openCreateDialogForCreate() {
      resetCreateDialogState();
      createTitle.textContent = "新建作品";
      createConfirmBtn.textContent = "创建";
      createMask.classList.add("show");
      createMask.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => createNameInput.focus());
    }

    async function openCreateDialogForRename(projectId) {
      const p = projects.find(i => i.id === projectId);
      if (!p) return;
      resetCreateDialogState();
      createDialogMode = "rename";
      createDialogEditingId = projectId;
      createTitle.textContent = "重命名作品";
      createConfirmBtn.textContent = "保存";
      createNameInput.value = p.name || "";
      createMask.classList.add("show");
      createMask.setAttribute("aria-hidden", "false");
      await setCreateIconPreviewByProject(p);
      requestAnimationFrame(() => createNameInput.focus());
    }

    function closeDialog(result) {
      if (!activeDialogResolver) return;
      const resolver = activeDialogResolver;
      activeDialogResolver = null;
      dialogMask.classList.remove("show");
      dialogMask.setAttribute("aria-hidden", "true");
      resolver(result);
    }

    function openConfirmDialog(message, confirmText = "确定") {
      if (activeDialogResolver) return Promise.resolve(null);
      return new Promise(resolve => {
        activeDialogResolver = resolve;
        dialogTitle.textContent = message;
        dialogConfirmBtn.textContent = confirmText;
        dialogMask.classList.add("show");
        dialogMask.setAttribute("aria-hidden", "false");
        dialogConfirmBtn.focus();
      });
    }

    function createProject() {
      openCreateDialogForCreate();
    }

    function renameProject(id) {
      openCreateDialogForRename(id);
    }

    async function deleteProject(id) {
      const p = projects.find(i => i.id === id);
      if (!p) return;
      const ok = await openConfirmDialog(`确定删除「${p.name}」？`, "删除");
      if (!ok) return;
      const refsToDelete = collectProjectImageRefs(p);
      const prevProjects = projects.slice();
      projects = projects.filter(i => i.id !== id);
      if (!persist()) {
        projects = prevProjects;
        showToast("删除失败：本地存储空间不足");
        return;
      }
      for (const ref of refsToDelete) {
        try { await deleteImageFromDb(ref); } catch {}
      }
      openedSwipeId = null;
      renderList();
      showToast("已删除");
    }

    function renderHistory(project) {
      const history = Array.isArray(project.history) ? project.history : [];
      historyList.innerHTML = "";
      historyEmpty.style.display = history.length ? "none" : "block";
      history.slice().reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "h-item";
        const noteText = String(item.note || "").trim();
        div.innerHTML = `
          <div class="h-top">
            <div class="h-row">行数：${clampRow(item.row)}</div>
            <div class="h-time">${escapeHtml(item.time || "")}</div>
          </div>
          <div class="h-note">${escapeHtml(noteText)}</div>
        `;
        historyList.appendChild(div);
      });
    }

    function addHistorySnapshot(project) {
      project.history = Array.isArray(project.history) ? project.history : [];
      project.history.push({
        row: clampRow(project.currentRow),
        note: String(noteInput.value || ""),
        time: nowText()
      });
    }

    function onPlus() {
      const p = currentProject();
      if (!p) return;
      const prevRow = clampRow(p.currentRow);
      const prevNote = String(p.note || "");
      const prevHistory = Array.isArray(p.history) ? p.history.slice() : [];
      addHistorySnapshot(p);
      p.currentRow = clampRow(p.currentRow + 1);
      rowNum.textContent = String(p.currentRow);
      renderHistory(p);
      noteInput.value = "";
      p.note = "";
      if (!persist()) {
        p.currentRow = prevRow;
        p.note = prevNote;
        p.history = prevHistory;
        rowNum.textContent = String(prevRow);
        noteInput.value = prevNote;
        renderHistory(p);
      }
    }

    function onMinus() {
      const p = currentProject();
      if (!p) return;
      p.history = Array.isArray(p.history) ? p.history : [];
      if (!p.history.length) {
        showToast("没有可删除的历史记录");
        return;
      }
      const prevRow = clampRow(p.currentRow);
      const prevNote = String(p.note || "");
      const prevHistory = p.history.slice();
      p.history.pop();
      p.currentRow = clampRow(p.currentRow - 1);
      rowNum.textContent = String(p.currentRow);
      renderHistory(p);
      if (!persist()) {
        p.currentRow = prevRow;
        p.note = prevNote;
        p.history = prevHistory;
        rowNum.textContent = String(prevRow);
        noteInput.value = prevNote;
        renderHistory(p);
      }
    }

    async function clearHistory() {
      const p = currentProject();
      if (!p) return;
      const ok = await openConfirmDialog("确定清空历史记录吗？", "清空");
      if (!ok) return;
      const oldHistory = Array.isArray(p.history) ? p.history.slice() : [];
      const oldRow = p.currentRow;
      p.history = [];
      p.currentRow = 1;
      if (!persist()) {
        p.history = oldHistory;
        p.currentRow = oldRow;
        renderHistory(p);
        rowNum.textContent = String(clampRow(oldRow));
        return;
      }
      rowNum.textContent = "1";
      renderHistory(p);
      showToast("历史已清空，行数已重置为 1");
    }

    newProjectBtn.addEventListener("click", createProject);
    titleBtn.addEventListener("click", openBackupDialog);
    backupExportBtn.addEventListener("click", async () => {
      await exportBackup();
      closeBackupDialog();
    });
    backupImportBtn.addEventListener("click", () => {
      closeBackupDialog();
      importInput.click();
    });
    backupMask.addEventListener("click", e => {
      if (e.target === backupMask) closeBackupDialog();
    });
    importMergeBtn.addEventListener("click", () => closeImportModeDialog("merge"));
    importOverwriteBtn.addEventListener("click", () => closeImportModeDialog("overwrite"));
    importModeMask.addEventListener("click", e => {
      if (e.target === importModeMask) closeImportModeDialog(null);
    });

    importInput.addEventListener("change", async () => {
      const file = importInput.files && importInput.files[0];
      importInput.value = "";
      if (!file) return;
      await importBackupFile(file);
    });

    createIconPreview.addEventListener("click", () => createIconInput.click());
    createIconPreview.addEventListener("keydown", e => {
      if (e.key !== "Enter" && e.key !== " ") return;
      e.preventDefault();
      createIconInput.click();
    });

    createIconInput.addEventListener("change", async () => {
      const file = createIconInput.files && createIconInput.files[0];
      if (!file) return;
      try {
        pendingCreateIconFile = file;
        if (pendingCreateIconPreviewUrl) URL.revokeObjectURL(pendingCreateIconPreviewUrl);
        pendingCreateIconPreviewUrl = URL.createObjectURL(file);
        createIconPreview.innerHTML = `<img src="${escapeHtml(pendingCreateIconPreviewUrl)}" alt="图标预览">`;
        createIconPreview.classList.remove("empty");
      } catch {
        showToast("读取图片失败");
      }
    });

    createCancelBtn.addEventListener("click", closeCreateDialog);

    createConfirmBtn.addEventListener("click", async () => {
      const name = createNameInput.value.trim();
      if (!name) return showToast("项目名不能为空");

      if (createDialogMode === "create") {
        let newIconRef = "";
        if (pendingCreateIconFile) {
          try {
            newIconRef = await saveImageBlobToDb(pendingCreateIconFile);
          } catch {
            showToast("创建失败：图标保存失败");
            return;
          }
        }

        const nextProject = {
          id: uid(),
          name,
          iconType: newIconRef ? "image" : "emoji",
          iconValue: newIconRef || iconByName(name),
          createdAt: nowMinuteText(),
          patternText: DEFAULT_PATTERN_TEXT,
          patternImages: [],
          currentRow: 1,
          note: "",
          history: []
        };

        projects.unshift(nextProject);
        if (!persist()) {
          projects.shift();
          if (newIconRef) {
            try { await deleteImageFromDb(newIconRef); } catch {}
          }
          showToast("创建失败：本地存储空间不足");
          return;
        }
        closeCreateDialog();
        renderList();
        showToast("已新建项目");
        return;
      }

      if (createDialogMode === "rename") {
        const p = projects.find(i => i.id === createDialogEditingId);
        if (!p) return;

        const oldName = p.name;
        const oldIconType = p.iconType;
        const oldIconValue = p.iconValue;
        let newIconRef = "";

        p.name = name;
        if (pendingCreateIconFile) {
          try {
            newIconRef = await saveImageBlobToDb(pendingCreateIconFile);
          } catch {
            p.name = oldName;
            showToast("保存失败：图标保存失败");
            return;
          }
          p.iconType = "image";
          p.iconValue = newIconRef;
        }

        if (!persist()) {
          p.name = oldName;
          p.iconType = oldIconType;
          p.iconValue = oldIconValue;
          if (newIconRef) {
            try { await deleteImageFromDb(newIconRef); } catch {}
          }
          showToast("保存失败：本地存储空间不足");
          return;
        }

        if (newIconRef && oldIconType === "image" && isImageDbRef(oldIconValue)) {
          try { await deleteImageFromDb(oldIconValue); } catch {}
        }

        closeCreateDialog();
        renderList();
        showToast("已保存");
      }
    });

    createMask.addEventListener("click", e => {
      if (e.target === createMask) closeCreateDialog();
    });

    patternBackBtn.addEventListener("click", () => {
      // 图解文本已在 input 事件中自动保存，返回时无需再次同步写入 localStorage
      toListView();
    });

    patternUploadBtn.addEventListener("click", () => {
      patternImageInput.click();
    });

    patternImageInput.addEventListener("change", async () => {
      const p = currentProject();
      if (!p) return;
      const files = Array.from(patternImageInput.files || []);
      if (!files.length) return;

      let savedCount = 0;
      let failedCount = 0;
      for (const file of files) {
        try {
          const ref = await saveImageBlobToDb(file);
          p.patternImages.push(ref);
          if (!persist()) {
            p.patternImages.pop();
            try { await deleteImageFromDb(ref); } catch {}
            failedCount += 1;
            continue;
          }
          savedCount += 1;
        } catch {
          failedCount += 1;
        }
      }
      patternImageInput.value = "";
      renderPatternImages(p);
      if (savedCount && !failedCount) {
        showToast(`已保存 ${savedCount} 张图片`);
        return;
      }
      if (savedCount && failedCount) {
        showToast(`已保存 ${savedCount} 张，${failedCount} 张未保存`);
        return;
      }
      if (!savedCount && failedCount) {
        showToast("图片未保存：本地存储空间不足或读取失败");
      }
    });

    patternImages.addEventListener("click", e => {
      if (Date.now() < suppressImageClickUntil) return;
      const card = findClosest(e.target, ".pattern-image");
      if (!card || !card.dataset.ref) return;
      openPhotoViewer(card.dataset.ref);
    });

    patternImages.addEventListener("contextmenu", e => {
      const card = findClosest(e.target, ".pattern-image");
      if (!card) return;
      e.preventDefault();
      const index = Number(card.dataset.index);
      requestDeletePatternImage(index);
    });

    patternImages.addEventListener("touchstart", e => {
      const card = findClosest(e.target, ".pattern-image");
      if (!card) return;
      cancelLongPressDelete();
      longPressTarget = card;
      longPressTimer = setTimeout(() => {
        const index = Number(longPressTarget && longPressTarget.dataset.index);
        suppressImageClickUntil = Date.now() + 500;
        requestDeletePatternImage(index);
        cancelLongPressDelete();
      }, 520);
    }, { passive: true });

    patternImages.addEventListener("touchmove", cancelLongPressDelete, { passive: true });
    patternImages.addEventListener("touchend", cancelLongPressDelete, { passive: true });
    patternImages.addEventListener("touchcancel", cancelLongPressDelete, { passive: true });

    startRowBtn.addEventListener("click", toRowView);

    rowBackBtn.addEventListener("click", () => {
      const p = currentProject();
      if (p) {
        const oldNote = p.note;
        p.note = String(noteInput.value || "");
        if (!persist()) {
          p.note = oldNote;
          return;
        }
      }
      toPatternView(currentId);
    });

    plusBtn.addEventListener("click", onPlus);
    minusBtn.addEventListener("click", onMinus);
    clearHistoryBtn.addEventListener("click", clearHistory);

    noteInput.addEventListener("input", () => {
      const p = currentProject();
      if (!p) return;
      const prevNote = String(p.note || "");
      p.note = String(noteInput.value || "");
      if (!persist()) {
        p.note = prevNote;
        noteInput.value = prevNote;
      }
    });

    patternText.addEventListener("input", () => {
      autoResizePatternText();
      const p = currentProject();
      if (!p) return;
      p.patternText = String(patternText.value || "");
      persist();
    });

    photoViewerMask.addEventListener("click", e => {
      if (e.target === photoViewerMask) closePhotoViewer();
    });

    dialogCancelBtn.addEventListener("click", () => closeDialog(null));
    dialogConfirmBtn.addEventListener("click", () => {
      closeDialog(true);
    });

    dialogMask.addEventListener("click", e => {
      if (e.target === dialogMask) closeDialog(null);
    });

    document.addEventListener("keydown", e => {
      if (createMask.classList.contains("show") && e.key === "Escape") {
        e.preventDefault();
        closeCreateDialog();
        return;
      }
      if (backupMask.classList.contains("show") && e.key === "Escape") {
        e.preventDefault();
        closeBackupDialog();
        return;
      }
      if (importModeMask.classList.contains("show") && e.key === "Escape") {
        e.preventDefault();
        closeImportModeDialog(null);
        return;
      }

      if (!activeDialogResolver) return;
      if (e.key === "Escape") {
        e.preventDefault();
        closeDialog(null);
      }
      if (e.key === "Enter") {
        e.preventDefault();
        closeDialog(true);
      }
    });

    ["gesturestart", "gesturechange", "gestureend"].forEach(type => {
      document.addEventListener(type, e => {
        e.preventDefault();
      }, { passive: false });
    });

    let lastNonInteractiveTouchEnd = 0;
    document.addEventListener("touchend", e => {
      const target = e.target;
      if (findClosest(target, "button, input, textarea, select, a, [contenteditable='true']")) return;
      const now = Date.now();
      if (now - lastNonInteractiveTouchEnd < 300) e.preventDefault();
      lastNonInteractiveTouchEnd = now;
    }, { passive: false });

    renderList();
    migrateLegacyPatternImages();
    migrateLegacyProjectIcons();
  </script>
</body>
</html>
