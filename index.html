<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>钩织记录</title>
  <style>
    :root {
      --bg: #fff5fb;
      --bg2: #fdf0ff;
      --card: #ffffff;
      --text: #3c2b44;
      --muted: #7a6a84;
      --pink: #ff73b6;
      --pink-deep: #f5539f;
      --rose: #ffc1df;
      --blue: #98d6ff;
      --danger: #ff6f8e;
      --shadow: 0 10px 24px rgba(245, 83, 159, 0.14);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overscroll-behavior: none;
      background:
        radial-gradient(120vw 60vh at 15% -5%, #ffd8ea 0, transparent 55%),
        radial-gradient(120vw 70vh at 100% 0%, #e7dcff 0, transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      min-height: 100svh;
      height: 100svh;
      overflow: hidden;
      overflow-x: hidden;
      touch-action: manipulation;
      padding: calc(10px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
    }

    .phone {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      min-height: calc(100svh - 22px - var(--safe-top) - var(--safe-bottom));
      height: calc(100svh - 22px - var(--safe-top) - var(--safe-bottom));
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    @media (min-width: 760px) {
      body { display: grid; place-items: center; }
      .phone {
        width: 420px;
        min-height: min(860px, calc(100svh - 20px));
        height: min(860px, calc(100svh - 20px));
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 26px 45px rgba(80, 40, 100, 0.18);
        padding: 6px 2px;
      }
    }

    .view { display: none; }
    .view.active {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
    }

    #listView,
    #contentView {
      padding-left: 12px;
      padding-right: 12px;
      overflow: hidden;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding: 4px 2px;
    }

    .title {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffd7ea, #e9e0ff);
      box-shadow: var(--shadow);
    }

    .btn {
      border: 0;
      border-radius: 14px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), #b085ff);
      box-shadow: var(--shadow);
      padding: 10px 12px;
    }

    .btn.secondary {
      color: #7a2f66;
      background: #fff;
      border: 1px solid #ffd2e9;
      box-shadow: 0 8px 18px rgba(131, 98, 152, 0.12);
    }

    .btn.danger { background: linear-gradient(135deg, var(--danger), #ff8dad); }
    .btn.small { font-size: 13px; padding: 8px 10px; border-radius: 12px; }
    .btn:active { transform: translateY(1px); }

    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.4;
      padding: 0 2px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      scrollbar-width: none;
    }

    .list::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .swipe-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      flex: 0 0 auto;
    }

    .swipe-actions {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px;
      background: linear-gradient(135deg, rgba(255, 114, 182, 0.16), rgba(177, 138, 255, 0.18));
    }

    .swipe-front {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(122, 90, 139, 0.11);
      padding: 12px;
      transform: translateX(0);
      transition: transform .18s ease;
      touch-action: pan-y;
    }

    .swipe-wrap.open .swipe-front { transform: translateX(-144px); }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: linear-gradient(135deg, #ffe2ef, #e8e0ff);
      flex: 0 0 auto;
    }

    .meta { flex: 1 1 auto; min-width: 0; }

    .name {
      font-size: 16px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row { margin-top: 5px; font-size: 13px; color: var(--muted); }

    .edit-btn {
      border: 0;
      border-radius: 12px;
      padding: 9px 11px;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, #ff7cbb, #af90ff);
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .new-box {
      margin-top: 12px;
      border-radius: 20px;
      border: 1px dashed #ffb7d9;
      background: rgba(255, 255, 255, 0.7);
      padding: 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .new-txt { color: #7b3a69; font-weight: 800; font-size: 14px; }

    .content-top {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding-top: 6px;
      margin-bottom: 10px;
    }

    .content-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 44px;
    }

    .project-title {
      text-align: center;
      font-weight: 1000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 25px;
      line-height: 1.2;
      letter-spacing: 0.3px;
      margin-top: -22px;
      padding: 0;
    }

    .panel {
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(122, 90, 139, 0.12);
      padding: 14px;
    }

    .counter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .step {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      border: 0;
      color: #fff;
      font-size: 30px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--pink), #ad90ff);
      box-shadow: var(--shadow);
    }

    .step.minus { background: linear-gradient(135deg, var(--blue), #a18dff); }

    .num {
      flex: 1;
      text-align: center;
      font-size: 46px;
      font-weight: 900;
      color: #2c1935;
    }

    .tip {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.4;
    }

    .note-panel,
    .history-panel { margin-top: 10px; }

    .history-panel {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      color: #4f2852;
      margin-bottom: 7px;
    }

    .label small { color: var(--muted); font-size: 12px; font-weight: 700; }

    textarea {
      width: 100%;
      min-height: 92px;
      border-radius: 14px;
      border: 1px solid #e7d6ff;
      background: #fff;
      padding: 11px;
      font-size: 14px;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: #ff8fc8;
      box-shadow: 0 0 0 4px rgba(255, 143, 200, 0.14);
    }

    .history-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 900;
      color: #4f2852;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none;
    }

    .history-list::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .history-item {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      background: linear-gradient(135deg, rgba(255, 118, 186, 0.1), rgba(176, 136, 255, 0.1));
      padding: 9px 10px;
    }

    .h-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .h-row { font-weight: 900; font-size: 14px; }
    .h-time { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .h-note { font-size: 13px; color: #43364b; white-space: pre-wrap; word-break: break-word; }
    .empty { color: var(--muted); font-size: 13px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(14px + var(--safe-bottom));
      transform: translateX(-50%);
      background: rgba(55, 30, 70, 0.9);
      color: #fff;
      border-radius: 12px;
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <main class="phone">
    <section class="view active" id="listView">
      <div class="top">
        <div class="title">🧶 钩织项目</div>
      </div>
      <div class="list" id="projectList"></div>
      <div class="new-box">
        <div class="new-txt">新开一个作品</div>
        <button class="btn" id="newProjectBtn">+ 新建钩织项目</button>
      </div>
    </section>

    <section class="view" id="contentView">
      <div class="content-top">
        <div class="content-actions">
          <button class="btn secondary small" id="backBtn">返回</button>
          <button class="btn small" id="saveBtn">保存</button>
        </div>
        <div class="project-title" id="contentTitle"></div>
      </div>

      <div class="panel">
        <div class="counter">
          <button class="step minus" id="minusBtn">-</button>
          <div class="num" id="rowNum">1</div>
          <button class="step" id="plusBtn">+</button>
        </div>
      </div>

      <div class="panel note-panel">
        <div class="label">备注 <small>可输入任意文字</small></div>
        <textarea id="noteInput" placeholder="例如：第18行换色；第22行加针"></textarea>
      </div>

      <div class="panel history-panel">
        <div class="history-title">
          <span>历史记录</span>
          <button class="btn secondary small" id="clearHistoryBtn">清空</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="empty" id="historyEmpty" style="display:none;">暂无历史记录</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "crochet_projects_v2";

    const listView = document.getElementById("listView");
    const contentView = document.getElementById("contentView");
    const projectList = document.getElementById("projectList");
    const newProjectBtn = document.getElementById("newProjectBtn");

    const backBtn = document.getElementById("backBtn");
    const saveBtn = document.getElementById("saveBtn");
    const contentTitle = document.getElementById("contentTitle");
    const rowNum = document.getElementById("rowNum");
    const plusBtn = document.getElementById("plusBtn");
    const minusBtn = document.getElementById("minusBtn");
    const noteInput = document.getElementById("noteInput");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const historyList = document.getElementById("historyList");
    const historyEmpty = document.getElementById("historyEmpty");
    const toastEl = document.getElementById("toast");

    const icons = ["🧶", "🧵", "🎀", "🌸", "🍓", "🐰", "✨", "🩷", "🪡"];

    let projects = loadProjects();
    if (!projects.length) {
      projects = [{
        id: uid(),
        name: "我的钩织项目",
        icon: "🧶",
        currentRow: 1,
        note: "",
        history: []
      }];
      persist();
    }

    let currentId = null;
    let openedSwipeId = null;
    let globalPointerBound = false;
    let storageErrorNotified = false;

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function nowText() {
      const d = new Date();
      const p = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 900);
    }

    function escapeHtml(v) {
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function clampRow(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return 1;
      return Math.max(1, Math.floor(n));
    }

    function iconByName(name) {
      let sum = 0;
      for (const ch of name) sum += ch.charCodeAt(0);
      return icons[sum % icons.length];
    }

    function loadProjects() {
      try {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function persist() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        storageErrorNotified = false;
        return true;
      } catch {
        if (!storageErrorNotified) {
          showToast("保存失败：本地存储空间不足");
          storageErrorNotified = true;
        }
        return false;
      }
    }

    function currentProject() {
      return projects.find(p => p.id === currentId) || null;
    }

    function toListView() {
      contentView.classList.remove("active");
      listView.classList.add("active");
      currentId = null;
      renderList();
    }

    function toContentView(id) {
      const p = projects.find(i => i.id === id);
      if (!p) return;
      currentId = id;
      listView.classList.remove("active");
      contentView.classList.add("active");
      contentTitle.textContent = `${p.icon} ${p.name}`;
      rowNum.textContent = String(clampRow(p.currentRow));
      noteInput.value = p.note || "";
      renderHistory(p);
    }

    function closeOpenedSwipe(exceptId = null) {
      if (!openedSwipeId || openedSwipeId === exceptId) return;
      const opened = document.querySelector(`.swipe-wrap[data-id="${openedSwipeId}"]`);
      if (opened) opened.classList.remove("open");
      openedSwipeId = null;
    }

    function onGlobalPointerDown(e) {
      if (!listView.classList.contains("active")) return;
      const wrap = e.target.closest(".swipe-wrap");
      if (!wrap) {
        closeOpenedSwipe();
        return;
      }
      closeOpenedSwipe(wrap.dataset.id);
    }

    function attachSwipe(front, wrap, id) {
      let sx = 0;
      let sy = 0;
      let tracking = false;

      function start(ev) {
        const t = ev.touches ? ev.touches[0] : ev;
        sx = t.clientX;
        sy = t.clientY;
        tracking = true;
      }

      function move(ev) {
        if (!tracking) return;
        const t = ev.touches ? ev.touches[0] : ev;
        const dx = t.clientX - sx;
        const dy = t.clientY - sy;
        if (Math.abs(dx) <= 14 || Math.abs(dx) <= Math.abs(dy)) return;
        if (ev.cancelable) ev.preventDefault();
        if (dx < -34) {
          closeOpenedSwipe(id);
          wrap.classList.add("open");
          openedSwipeId = id;
        }
        if (dx > 30) {
          wrap.classList.remove("open");
          if (openedSwipeId === id) openedSwipeId = null;
        }
      }

      function end() {
        tracking = false;
      }

      if (window.PointerEvent) {
        front.addEventListener("pointerdown", start);
        front.addEventListener("pointermove", move);
        front.addEventListener("pointerup", end);
        front.addEventListener("pointercancel", end);
      } else {
        front.addEventListener("touchstart", start, { passive: true });
        front.addEventListener("touchmove", move, { passive: false });
        front.addEventListener("touchend", end, { passive: true });
      }
    }

    function renderList() {
      projectList.innerHTML = "";
      projects.forEach(project => {
        const wrap = document.createElement("div");
        wrap.className = "swipe-wrap";
        wrap.dataset.id = project.id;

        const actions = document.createElement("div");
        actions.className = "swipe-actions";
        actions.innerHTML = `
          <button class="btn secondary small" data-act="rename">重命名</button>
          <button class="btn danger small" data-act="delete">删除</button>
        `;

        const front = document.createElement("div");
        front.className = "swipe-front";
        front.innerHTML = `
          <div class="icon">${escapeHtml(project.icon || "🧶")}</div>
          <div class="meta">
            <div class="name">${escapeHtml(project.name || "未命名项目")}</div>
            <div class="row">当前行数：<b>${clampRow(project.currentRow)}</b></div>
          </div>
          <button class="edit-btn" data-act="edit">编辑</button>
        `;

        actions.addEventListener("click", e => {
          const btn = e.target.closest("button");
          if (!btn) return;
          const act = btn.dataset.act;
          if (act === "rename") renameProject(project.id);
          if (act === "delete") deleteProject(project.id);
        });

        front.addEventListener("click", e => {
          const btn = e.target.closest("button");
          if (btn && btn.dataset.act === "edit") {
            closeOpenedSwipe();
            toContentView(project.id);
            return;
          }
          if (wrap.classList.contains("open")) {
            wrap.classList.remove("open");
            openedSwipeId = null;
            return;
          }
          closeOpenedSwipe();
          toContentView(project.id);
        });

        attachSwipe(front, wrap, project.id);
        wrap.appendChild(actions);
        wrap.appendChild(front);
        projectList.appendChild(wrap);
      });

      if (!globalPointerBound) {
        document.addEventListener("pointerdown", onGlobalPointerDown, { capture: true });
        globalPointerBound = true;
      }
    }

    function createProject() {
      const name = prompt("请输入项目名称", `钩织项目 ${projects.length + 1}`);
      if (name === null) return;
      const v = name.trim();
      if (!v) return showToast("项目名不能为空");
      projects.unshift({
        id: uid(),
        name: v,
        icon: iconByName(v),
        currentRow: 1,
        note: "",
        history: []
      });
      persist();
      renderList();
      showToast("已新建项目");
    }

    function renameProject(id) {
      const p = projects.find(i => i.id === id);
      if (!p) return;
      const name = prompt("请输入新名称", p.name || "");
      if (name === null) return;
      const v = name.trim();
      if (!v) return showToast("项目名不能为空");
      p.name = v;
      p.icon = p.icon || iconByName(v);
      persist();
      renderList();
      showToast("已重命名");
    }

    function deleteProject(id) {
      const p = projects.find(i => i.id === id);
      if (!p) return;
      if (!confirm(`确定删除「${p.name}」？`)) return;
      projects = projects.filter(i => i.id !== id);
      if (!projects.length) {
        projects.push({ id: uid(), name: "新的钩织项目", icon: "🧶", currentRow: 1, note: "", history: [] });
      }
      persist();
      openedSwipeId = null;
      renderList();
      showToast("已删除");
    }

    function renderHistory(project) {
      const history = Array.isArray(project.history) ? project.history : [];
      historyList.innerHTML = "";
      historyEmpty.style.display = history.length ? "none" : "block";
      history.slice().reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        const noteText = String(item.note || "").trim();
        div.innerHTML = `
          <div class="h-top">
            <div class="h-row">行数：${clampRow(item.row)}</div>
            <div class="h-time">${escapeHtml(item.time || "")}</div>
          </div>
          <div class="h-note">${escapeHtml(noteText)}</div>
        `;
        historyList.appendChild(div);
      });
    }

    function addHistorySnapshot(project) {
      project.history = Array.isArray(project.history) ? project.history : [];
      project.history.push({
        row: clampRow(project.currentRow),
        note: String(noteInput.value || ""),
        time: nowText()
      });
    }

    function onPlus() {
      const p = currentProject();
      if (!p) return;
      addHistorySnapshot(p);
      p.currentRow = clampRow(p.currentRow + 1);
      rowNum.textContent = String(p.currentRow);
      renderHistory(p);
      noteInput.value = "";
      p.note = "";
      persist();
    }

    function onMinus() {
      const p = currentProject();
      if (!p) return;
      p.history = Array.isArray(p.history) ? p.history : [];
      if (!p.history.length) {
        showToast("没有可删除的历史记录");
        return;
      }
      p.history.pop();
      p.currentRow = clampRow(p.currentRow - 1);
      rowNum.textContent = String(p.currentRow);
      renderHistory(p);
      persist();
    }

    function onSave() {
      const p = currentProject();
      if (!p) return;
      p.currentRow = clampRow(rowNum.textContent);
      p.note = String(noteInput.value || "");
      persist();
      showToast("保存成功");
    }

    function clearHistory() {
      const p = currentProject();
      if (!p) return;
      if (!confirm("确定清空历史记录吗？")) return;
      p.history = [];
      p.currentRow = 1;
      persist();
      rowNum.textContent = "1";
      renderHistory(p);
      showToast("历史已清空，行数已重置为 1");
    }

    newProjectBtn.addEventListener("click", createProject);
    backBtn.addEventListener("click", () => {
      const p = currentProject();
      if (p) {
        p.note = String(noteInput.value || "");
        persist();
      }
      toListView();
    });
    saveBtn.addEventListener("click", onSave);
    plusBtn.addEventListener("click", onPlus);
    minusBtn.addEventListener("click", onMinus);
    clearHistoryBtn.addEventListener("click", clearHistory);

    noteInput.addEventListener("input", () => {
      const p = currentProject();
      if (!p) return;
      p.note = String(noteInput.value || "");
    });

    // 防止缩放手势，不拦截按钮快速连续点击
    ["gesturestart", "gesturechange", "gestureend"].forEach(type => {
      document.addEventListener(type, e => {
        e.preventDefault();
      }, { passive: false });
    });

    renderList();
  </script>
</body>
</html>
